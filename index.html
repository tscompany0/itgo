                Info: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>,
                Check: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>,

        // --- 이미지 단가표 데이터 (기존 유지) ---
        const PRICING_DATA = {
            motorcycle: [[5, 1.2], [10, 1.7], [20, 2.2], [30, 2.7], [50, 3.7]],
            damas: [[5, 2.5], [10, 3.0], [20, 3.5], [30, 4.0], [50, 5.0], [70, 6.0], [90, 8.0]],
            labo: [[5, 3.0], [10, 3.5], [20, 4.0], [30, 5.0], [50, 6.0], [70, 7.0], [90, 9.0], [110, 10.0]],
            trucks: {
                '1ton': [[15, 4], [30, 5], [50, 6], [70, 7], [90, 8], [110, 9], [130, 10], [150, 11], [170, 12], [200, 13], [220, 14], [250, 15], [300, 17], [350, 19], [400, 20], [450, 22], [500, 25], [550, 27], [600, 30]],
                '1.4ton': [[15, 5], [30, 6], [50, 7], [70, 8], [90, 9], [110, 10], [130, 11], [150, 12], [170, 13], [200, 14], [220, 16], [250, 17], [300, 19], [350, 21], [400, 22], [450, 24], [500, 28], [550, 30], [600, 32]],
                '2.5ton': [[15, 7], [30, 8], [50, 9], [70, 10], [90, 11], [110, 13], [130, 14], [150, 15], [170, 16], [200, 18], [220, 20], [250, 23], [300, 26], [350, 28], [400, 30], [450, 32], [500, 34], [550, 36], [600, 38]],
                '3.5ton': [[15, 8], [30, 9], [50, 10], [70, 11], [90, 12], [110, 14], [130, 15], [150, 16], [170, 17], [200, 19], [220, 21], [250, 24], [300, 27], [350, 29], [400, 31], [450, 33], [500, 35], [550, 37], [600, 40]],
                '5ton': [[15, 9], [30, 10], [50, 12], [70, 14], [90, 15], [110, 16], [130, 17], [150, 18], [170, 19], [200, 21], [220, 24], [250, 27], [300, 32], [350, 34], [400, 36], [450, 38], [500, 40], [550, 42], [600, 44]],
                '5ton_plus': [[15, 11], [30, 12], [50, 13], [70, 15], [90, 16], [110, 17], [130, 18], [150, 19], [170, 22], [200, 24], [220, 26], [250, 29], [300, 32], [350, 34], [400, 36], [450, 38], [500, 42], [550, 45], [600, 47]],
                '5ton_chuk': [[15, 12], [30, 13], [50, 14], [70, 16], [90, 18], [110, 19], [130, 20], [150, 21], [170, 24], [200, 26], [220, 29], [250, 32], [300, 35], [350, 38], [400, 40], [450, 42], [500, 45], [550, 47], [600, 50]],
                '11ton': [[15, 14], [30, 15], [50, 16], [70, 18], [90, 19], [110, 20], [130, 21], [150, 23], [170, 26], [200, 29], [220, 32], [250, 35], [300, 38], [350, 42], [400, 44], [450, 45], [500, 48], [550, 50], [600, 55]],
                '18ton': [[15, 16], [30, 17], [50, 18], [70, 21], [90, 23], [110, 24], [130, 25], [150, 27], [170, 29], [200, 32], [220, 36], [250, 39], [300, 42], [350, 46], [400, 48], [450, 49], [500, 52], [550, 55], [600, 60]],
                '25ton': [[15, 17], [30, 19], [50, 21], [70, 23], [90, 24], [110, 26], [130, 28], [150, 30], [170, 32], [200, 36], [220, 40], [250, 43], [300, 46], [350, 50], [400, 52], [450, 54], [500, 58], [550, 61], [600, 65]],
            }
        };

        const CATEGORIES = [
            { id: 'motorcycle', name: '오토바이 퀵', img: 'bike.jpg' },
            { id: 'damas', name: '다마스', img: 'damas.jpg' },
            { id: 'labo', name: '라보', img: 'labo.jpg' },
            { id: 'truck', name: '트럭', img: 'truck.jpg' },
        ];

        const TONS = [
            { id: '1ton', name: '1t (1.6*2.8)', table: PRICING_DATA.trucks['1ton'] },
            { id: '1.4ton', name: '1.4t (1.7*3.1)', table: PRICING_DATA.trucks['1.4ton'] },
            { id: '2.5ton', name: '2.5t (1.8*4.3)', table: PRICING_DATA.trucks['2.5ton'] },
            { id: '3.5ton', name: '3.5t (2*4.6)', table: PRICING_DATA.trucks['3.5ton'] },
            { id: '5ton', name: '5t (2.2*6.2)', table: PRICING_DATA.trucks['5ton'] },
            { id: '5ton_plus', name: '5t 플러스 (2.2*7.4)', table: PRICING_DATA.trucks['5ton_plus'] },
            { id: '5ton_chuk', name: '5t 축 (2.2*7.4)', table: PRICING_DATA.trucks['5ton_chuk'] },
            { id: '11ton', name: '11t (2.3*9.1)', table: PRICING_DATA.trucks['11ton'] },
            { id: '18ton', name: '18t (2.3*10)', table: PRICING_DATA.trucks['18ton'] },
            { id: '25ton', name: '25t (2.3*10)', table: PRICING_DATA.trucks['25ton'] },
        ];

        const VEHICLE_TYPES = [
            { group: '카고계열', types: [
                { id: 'cargo', name: '카고', surcharge: 0 },
                { id: 'plus_cargo', name: '플러스카고', surcharge: 10000 },
                { id: 'chuk_cargo', name: '축카고', surcharge: 20000 },
            ]},
            { group: '윙바디계열', types: [
                { id: 'wing', name: '윙바디', surcharge: 20000 },
                { id: 'plus_wing', name: '플러스윙', surcharge: 30000 },
                { id: 'chuk_wing', name: '축윙', surcharge: 40000 },
            ]},
            { group: '탑/냉동계열', types: [
                { id: 'top', name: '탑차', surcharge: 10000 },
                { id: 'freezer_top', name: '냉동탑', surcharge: 40000 },
                { id: 'freezer_wing', name: '냉동윙', surcharge: 50000 },
            ]},
            { group: '특수/리프트', types: [
                { id: 'lift_cargo', name: '리프트카고', surcharge: 30000 },
                { id: 'lift_wing', name: '리프트윙', surcharge: 45000 },
                { id: 'extra_long', name: '초장축', surcharge: 20000 },
            ]}
        ];

        const ITEM_CATEGORIES = [
            { id: 'pallet', name: '파레트', icon: '📦', sizes: ['1100*1100', '1200*1000', 'KPP규격', '기타'] },
            { id: 'box', name: '박스', icon: '📥', sizes: ['소형', '중형', '대형', '특대형'] },
            { id: 'furniture', name: '가구/가전', icon: '🛋️', sizes: ['1인용', '가족형', '대형가전'] },
            { id: 'other', name: '기타 화물', icon: '📝', sizes: ['직접입력'] },
        ];

        const METHOD_OPTIONS = [
            { id: 'basic', name: '기본 운송', desc: '차량이 건물 앞에서 건물 앞까지 운송합니다.', price: 0 },
            { id: 'forklift', name: '상하차(지게차)', desc: '파레트로 작업된 제품을 지게차로 상하차 합니다.', price: 0 },
            { id: 'helper_a', name: '기사님 도움 A', desc: '일반화물 또는 소형가전(3개미만) 을 고객님과 함께 운반합니다.', price: 20000 },
            { id: 'helper_b', name: '기사님 도움 B', desc: '기사님 도움 A + 간단이사 - 1층 또는 엘리베이터 기준', price: 50000 },
        ];

        const KAKAO_API_KEY = '1452d4f7d1995e5c8d57c8c7261cfee0';

        // --- 요금 계산 핵심 알고리즘 ---
        const getInterpolatedPrice = (table, dist) => {
            if (!table || table.length === 0) return 0;
            if (dist <= table[0][0]) return table[0][1] * 10000;
            const lastIdx = table.length - 1;
            if (dist >= table[lastIdx][0]) {
                const overKm = dist - table[lastIdx][0];
                const lastDistDiff = table[lastIdx][0] - table[lastIdx-1][0];
                const lastPriceDiff = table[lastIdx][1] - table[lastIdx-1][1];
                const perKmRate = lastPriceDiff / lastDistDiff;
                return (table[lastIdx][1] + (overKm * perKmRate)) * 10000;
            }
            for (let i = 0; i < table.length - 1; i++) {
                const startDist = table[i][0];
                const endDist = table[i+1][0];
                if (dist >= startDist && dist <= endDist) {
                    const startPrice = table[i][1];
                    const endPrice = table[i+1][1];
                    const ratio = (dist - startDist) / (endDist - startDist);
                    return (startPrice + (endPrice - startPrice) * ratio) * 10000;
                }
            }
            return table[0][1] * 10000;
        };

        function App() {
            const [startPoint, setStartPoint] = useState({ address: '', x: null, y: null });
            const [endPoint, setEndPoint] = useState({ address: '', x: null, y: null });
            const [distance, setDistance] = useState(0); 
            const [isDistanceLoading, setIsDistanceLoading] = useState(false);

            const [selectedCategory, setSelectedCategory] = useState(CATEGORIES[3]);
            const [selectedTon, setSelectedTon] = useState(TONS[0]);
            const [selectedType, setSelectedType] = useState(VEHICLE_TYPES[0].types[0]);
            
            const [selectedMethod, setSelectedMethod] = useState(METHOD_OPTIONS[0]);
            const [isPassenger, setIsPassenger] = useState(false);
            const [isRoundTrip, setIsRoundTrip] = useState(false);
            const [waypointCount, setWaypointCount] = useState(0);
            const [weatherType, setWeatherType] = useState('none'); 

            const [selectedItemCat, setSelectedItemCat] = useState(ITEM_CATEGORIES[0]);
            const [itemQty, setItemQty] = useState(1);
            const [itemSize, setItemSize] = useState(ITEM_CATEGORIES[0].sizes[0]);
            const [itemWeight, setItemWeight] = useState(0.1);

            const [isPostcodeVisible, setIsPostcodeVisible] = useState(false);
            const [postcodeTarget, setPostcodeTarget] = useState('start');
            const postcodeContainerRef = useRef(null);
            const [toastMessage, setToastMessage] = useState('');

            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js";
                script.async = true;
                document.head.appendChild(script);
                return () => { if(document.head.contains(script)) document.head.removeChild(script); };
            }, []);

            const fetchCoords = async (address) => {
                try {
                    const response = await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(address)}`, {
                        headers: { Authorization: `KakaoAK ${KAKAO_API_KEY}` }
                    });
                    const data = await response.json();
                    return data.documents?.length > 0 ? { x: parseFloat(data.documents[0].x), y: parseFloat(data.documents[0].y) } : null;
                } catch (e) { return null; }
            };

            const openPostcode = (type) => {
                setPostcodeTarget(type);
                setIsPostcodeVisible(true);
            };

            useEffect(() => {
                if (isPostcodeVisible && window.daum && postcodeContainerRef.current) {
                    postcodeContainerRef.current.innerHTML = '';
                    new window.daum.Postcode({
                        oncomplete: async (data) => {
                            const addr = data.address;
                            setIsPostcodeVisible(false);
                            const coords = await fetchCoords(addr);
                            const info = { address: addr, x: coords?.x, y: coords?.y };
                            if (postcodeTarget === 'start') setStartPoint(info);
                            else setEndPoint(info);
                        },
                        width: '100%',
                        height: '100%'
                    }).embed(postcodeContainerRef.current);
                }
            }, [isPostcodeVisible, postcodeTarget]);

            useEffect(() => {
                const calculateDistance = async () => {
                    if (startPoint.x && endPoint.x) {
                        setIsDistanceLoading(true);
                        try {
                            const url = `https://apis-navi.kakaomobility.com/v1/directions?origin=${startPoint.x},${startPoint.y}&destination=${endPoint.x},${endPoint.y}`;
                            const response = await fetch(url, {
                                headers: { Authorization: `KakaoAK ${KAKAO_API_KEY}` }
                            });
                            const data = await response.json();
                            if (data.routes && data.routes.length > 0) {
                                const distanceKm = (data.routes[0].summary.distance / 1000).toFixed(2);
                                setDistance(Number(distanceKm));
                            } else { throw new Error('경로 없음'); }
                        } catch (e) {
                            const R = 6371;
                            const dLat = (endPoint.y - startPoint.y) * (Math.PI / 180);
                            const dLon = (endPoint.x - startPoint.x) * (Math.PI / 180);
                            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(startPoint.y * (Math.PI/180)) * Math.cos(endPoint.y * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2);
                            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                            setDistance(Math.max(1, Math.round(R * c * 1.3))); 
                        } finally { setIsDistanceLoading(false); }
                    }
                };
                calculateDistance();
            }, [startPoint, endPoint]);

            const calculation = useMemo(() => {
                if (distance === 0) return 0;
                let total = 0;
                if (selectedCategory.id === 'truck') {
                    total = getInterpolatedPrice(selectedTon.table, distance);
                } else {
                    total = getInterpolatedPrice(PRICING_DATA[selectedCategory.id], distance);
                }
                total += selectedType.surcharge;
                total += selectedMethod.price;
                if (isPassenger) total += 10000;
                if (waypointCount > 0) total += (waypointCount * 10000);
                if (isRoundTrip) total *= 1.7;
                if (weatherType !== 'none') total *= 1.2;
                return Math.ceil(total / 5000) * 5000;
            }, [distance, selectedCategory, selectedTon, selectedType, selectedMethod, isPassenger, isRoundTrip, waypointCount, weatherType]);

            const formatPrice = (p) => new Intl.NumberFormat('ko-KR').format(p);

            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(''), 3000);
            };

            const copyQuote = () => {
                const text = `[잇고 itgo 견적]\n상차: ${startPoint.address}\n하차: ${endPoint.address}\n차량: ${selectedCategory.name} ${selectedCategory.id === 'truck' ? selectedTon.name : ''}\n거리: ${distance}km\n예상운임: ${formatPrice(calculation)}원`;
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast('견적 정보가 클립보드에 복사되었습니다.');
                } catch (err) {
                    showToast('복사에 실패했습니다.');
                } finally {
                    document.body.removeChild(textarea);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-10 relative">
                    {toastMessage && (
                        <div className="fixed top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl z-[9999] text-sm font-bold animate-in fade-in slide-in-from-top-4">
                            {toastMessage}
                        </div>
                    )}

                    <header className="max-w-7xl mx-auto mb-12 flex items-center justify-between">
                        <div className="flex items-center gap-5">
                            {/* 🚀 메인 로고 이미지 적용 (itgo.jpg) */}
                            <div className="bg-white p-3 rounded-[24px] shadow-xl flex items-center justify-center overflow-hidden w-20 h-20 md:w-24 md:h-24">
                                <img src="itgo.jpg" alt="itgo logo" className="w-full h-full object-contain" onError={(e) => {
                                    e.target.style.display = 'none';
                                    e.target.parentNode.innerHTML = '<span class="text-xl font-black italic">itgo</span>';
                                }} />
                            </div>
                            <div className="hidden sm:block">
                                <h1 className="text-xl font-black text-slate-800 tracking-tight italic">잇고 통합 단가 매니저</h1>
                                <p className="text-[11px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-0.5">Reliable Freight Solution</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="text-right hidden lg:block">
                                <p className="text-[10px] text-slate-400 font-black mb-0.5">CUSTOMER CENTER</p>
                                <p className="text-lg font-black text-blue-600">1844-1562</p>
                            </div>
                            <button onClick={() => window.location.reload()} className="p-3 bg-white rounded-2xl border border-slate-200 text-slate-400 hover:text-blue-600 transition-all shadow-sm">
                                <Icon name="RotateCcw" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10 items-start pb-24">
                        <div className="lg:col-span-8 space-y-8">
                            <section className="itgo-card p-8 rounded-[40px]">
                                <h2 className="section-title"><Icon name="Navigation" className="w-4 h-4 text-blue-500" /> 01. 상/하차지 설정</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div onClick={() => openPostcode('start')} className="group cursor-pointer">
                                        <p className="text-[11px] font-bold text-slate-400 mb-3 ml-1">출발지 (상차)</p>
                                        <div className="p-5 bg-slate-50 border border-slate-100 rounded-3xl group-hover:border-blue-500 group-hover:bg-white transition-all flex items-center gap-4">
                                            <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm"><Icon name="MapPin" className="w-6 h-6 text-blue-500" /></div>
                                            <span className={`text-sm font-bold truncate flex-1 ${startPoint.address ? 'text-slate-900' : 'text-slate-300'}`}>
                                                {startPoint.address || '주소를 검색해 주세요 *'}
                                            </span>
                                        </div>
                                    </div>
                                    <div onClick={() => openPostcode('end')} className="group cursor-pointer">
                                        <p className="text-[11px] font-bold text-slate-400 mb-3 ml-1">도착지 (하차)</p>
                                        <div className="p-5 bg-slate-50 border border-slate-100 rounded-3xl group-hover:border-orange-500 group-hover:bg-white transition-all flex items-center gap-4">
                                            <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm"><Icon name="MapPin" className="w-6 h-6 text-orange-500" /></div>
                                            <span className={`text-sm font-bold truncate flex-1 ${endPoint.address ? 'text-slate-900' : 'text-slate-300'}`}>
                                                {endPoint.address || '주소를 검색해 주세요 *'}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section className="itgo-card p-8 rounded-[40px]">
                                <h2 className="section-title"><Icon name="Truck" className="w-4 h-4 text-blue-500" /> 02. 차량 및 제원 선택</h2>
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10">
                                    {CATEGORIES.map(cat => (
                                        <button key={cat.id} onClick={() => setSelectedCategory(cat)} className={`flex flex-col items-center p-4 rounded-[32px] border-2 transition-all ${selectedCategory.id === cat.id ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-transparent bg-slate-50 text-slate-400 hover:bg-slate-100'}`}>
                                            {/* 🚀 차량별 아이콘 이미지 적용 */}
                                            <div className={`mb-3 w-20 h-20 rounded-2xl flex items-center justify-center overflow-hidden bg-white shadow-sm border ${selectedCategory.id === cat.id ? 'border-blue-200' : 'border-slate-100'}`}>
                                                <img src={cat.img} alt={cat.name} className="w-full h-full object-contain" onError={(e) => {
                                                    e.target.style.display = 'none';
                                                    e.target.parentNode.innerHTML = `<span class="text-[10px] text-slate-400">${cat.name}</span>`;
                                                }} />
                                            </div>
                                            <span className="font-bold text-[11px]">{cat.name}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 p-7 bg-slate-50/50 rounded-[32px] border border-slate-100">
                                    <div className="space-y-2.5">
                                        <label className="text-[10px] font-black text-slate-400 ml-1 uppercase tracking-wider">톤수 선택</label>
                                        <div className="relative">
                                            <select disabled={selectedCategory.id !== 'truck'} value={selectedTon.id} onChange={(e) => setSelectedTon(TONS.find(t => t.id === e.target.value))} className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm appearance-none outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all disabled:opacity-40">
                                                {TONS.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                            </select>
                                            <div className="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-300">
                                                <Icon name="ChevronDown" className="w-4 h-4" />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-2.5">
                                        <label className="text-[10px] font-black text-slate-400 ml-1 uppercase tracking-wider">상세 차종</label>
                                        <div className="relative">
                                            <select value={selectedType.id} onChange={(e) => { const allTypes = VEHICLE_TYPES.flatMap(g => g.types); setSelectedType(allTypes.find(v => v.id === e.target.value)); }} className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm appearance-none outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all">
                                                {VEHICLE_TYPES.map(group => (
                                                    <optgroup key={group.group} label={group.group} className="text-slate-400 font-bold bg-white">
                                                        {group.types.map(v => ( <option key={v.id} value={v.id} className="text-slate-900">{v.name}</option> ))}
                                                    </optgroup>
                                                ))}
                                            </select>
                                            <div className="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-300">
                                                <Icon name="ChevronDown" className="w-4 h-4" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section className="itgo-card p-8 rounded-[40px]">
                                <h2 className="section-title"><Icon name="Package" className="w-4 h-4 text-blue-500" /> 03. 운송 화물 정보</h2>
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
                                    {ITEM_CATEGORIES.map(cat => (
                                        <button key={cat.id} onClick={() => { setSelectedItemCat(cat); setItemSize(cat.sizes[0]); }} className={`flex flex-col items-center py-5 rounded-[28px] border-2 transition-all ${selectedItemCat.id === cat.id ? 'border-slate-800 bg-slate-800 text-white shadow-xl' : 'bg-slate-50 border-transparent text-slate-400 hover:bg-slate-100'}`}>
                                            <span className="text-2xl mb-1.5">{cat.icon}</span>
                                            <span className="font-bold text-[11px]">{cat.name}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-50/50 p-7 rounded-[32px] border border-slate-100">
                                    <div className="space-y-2.5">
                                        <label className="text-[10px] font-bold text-slate-500 ml-1">수량/개수</label>
                                        <div className="flex items-center bg-white rounded-2xl border border-slate-200 overflow-hidden">
                                            <input type="number" value={itemQty} onChange={(e) => setItemQty(parseInt(e.target.value) || 1)} className="w-full px-5 py-4 text-center font-bold text-sm outline-none bg-transparent" />
                                        </div>
                                    </div>
                                    <div className="space-y-2.5">
                                        <label className="text-[10px] font-bold text-slate-500 ml-1">규격 선택</label>
                                        <select value={itemSize} onChange={(e) => setItemSize(e.target.value)} className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm outline-none cursor-pointer">
                                            {selectedItemCat.sizes.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2.5">
                                        <label className="text-[10px] font-bold text-slate-500 ml-1">총 중량(t)</label>
                                        <div className="relative">
                                            <input type="number" step="0.1" value={itemWeight} onChange={(e) => setItemWeight(parseFloat(e.target.value) || 0)} className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm outline-none" />
                                            <span className="absolute right-5 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-300 uppercase">ton</span>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section className="itgo-card p-8 rounded-[40px]">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="section-title mb-0"><Icon name="Plus" className="w-4 h-4 text-blue-500" /> 04. 추가 옵션 및 할증</h2>
                                    <button onClick={() => setIsPassenger(!isPassenger)} className={`flex items-center gap-3 px-5 py-2.5 rounded-2xl font-bold text-xs transition-all ${isPassenger ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                                        {isPassenger && <Icon name="Check" className="w-3.5 h-3.5" />} 동승 1인 (+1만)
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                                    {METHOD_OPTIONS.map(opt => (
                                        <button key={opt.id} onClick={() => setSelectedMethod(opt)} className={`flex flex-col text-left p-5 rounded-[24px] border-2 transition-all ${selectedMethod.id === opt.id ? 'border-blue-600 bg-blue-50/50 shadow-sm' : 'border-transparent bg-slate-50 hover:bg-slate-100'}`}>
                                            <div className="flex items-center gap-2 mb-3">
                                                <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${selectedMethod.id === opt.id ? 'border-blue-600 bg-blue-600' : 'border-slate-300 bg-white'}`}>
                                                    {selectedMethod.id === opt.id && <div className="w-1.5 h-1.5 bg-white rounded-full" />}
                                                </div>
                                                <span className={`text-[13px] font-bold ${selectedMethod.id === opt.id ? 'text-blue-700' : 'text-slate-500'}`}>{opt.name}</span>
                                            </div>
                                            <p className={`text-[10px] leading-relaxed ${selectedMethod.id === opt.id ? 'text-blue-400' : 'text-slate-400'}`}>{opt.desc}</p>
                                        </button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                    <div className={`p-5 rounded-[28px] border-2 transition-all flex items-center justify-between cursor-pointer ${isRoundTrip ? 'bg-blue-50 border-blue-600' : 'bg-slate-50 border-transparent hover:bg-slate-100'}`} onClick={() => setIsRoundTrip(!isRoundTrip)}>
                                        <div className="flex items-center gap-3">
                                            <div className={`w-6 h-6 rounded-lg flex items-center justify-center ${isRoundTrip ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-300 border border-slate-100'}`}><Icon name="RotateCcw" className="w-3.5 h-3.5" /></div>
                                            <span className={`text-[13px] font-black ${isRoundTrip ? 'text-blue-700' : 'text-slate-600'}`}>왕복 운행 (1.7배)</span>
                                        </div>
                                        <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center ${isRoundTrip ? 'border-blue-600 bg-blue-600' : 'border-slate-300 bg-white'}`}>
                                            {isRoundTrip && <div className="w-1 h-1 bg-white rounded-full" />}
                                        </div>
                                    </div>
                                    <div className="p-5 bg-slate-50 rounded-[28px] flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <div className="w-6 h-6 rounded-lg bg-white flex items-center justify-center border border-slate-100 text-slate-400"><Icon name="MapPin" className="w-3.5 h-3.5" /></div>
                                            <span className="text-[13px] font-black text-slate-600">경유지 (+1만)</span>
                                        </div>
                                        <div className="flex items-center gap-4 bg-white px-3 py-1.5 rounded-xl border border-slate-200">
                                            <button onClick={() => setWaypointCount(Math.max(0, waypointCount - 1))} className="text-slate-300 hover:text-blue-500"><Icon name="Minus" className="w-3.5 h-3.5" /></button>
                                            <span className="text-xs font-black text-blue-600 min-w-[20px] text-center">{waypointCount}</span>
                                            <button onClick={() => setWaypointCount(waypointCount + 1)} className="text-slate-300 hover:text-blue-500"><Icon name="Plus" className="w-3.5 h-3.5" /></button>
                                        </div>
                                    </div>
                                    <div className="p-2 bg-slate-50 rounded-[28px] flex items-center gap-2">
                                        <button onClick={() => setWeatherType(weatherType === 'rain' ? 'none' : 'rain')} className={`flex-1 py-3 px-2 rounded-[22px] text-xs font-bold flex items-center justify-center gap-2 transition-all ${weatherType === 'rain' ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-100'}`}>
                                            <Icon name="CloudRain" className="w-4 h-4" /> 우천시 (+20%)
                                        </button>
                                    </div>
                                </div>
                            </section>
                        </div>

                        <div className="lg:col-span-4 lg:sticky lg:top-10">
                            <div className="bg-[#1E293B] rounded-[48px] p-10 text-white shadow-2xl border border-slate-800 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-40 h-40 bg-blue-500 opacity-[0.05] rounded-full -mr-20 -mt-20 blur-3xl" />
                                <div className="flex justify-between items-center mb-16 relative z-10">
                                    <div className="flex items-center gap-3 opacity-30">
                                        <Icon name="Link2" className="w-5 h-5 text-blue-400" />
                                        <span className="text-[10px] font-black tracking-widest uppercase italic">itgo analytics</span>
                                    </div>
                                    <div className="flex gap-1.5">
                                        <div className="w-2 h-2 bg-blue-500 rounded-full animate-pulse" />
                                        <div className="w-2 h-2 bg-slate-700 rounded-full" />
                                    </div>
                                </div>
                                <div className="space-y-10 mb-12 relative z-10">
                                    <div>
                                        <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-3 opacity-80">Route Distance</p>
                                        <div className="flex items-baseline gap-2">
                                            {isDistanceLoading ? <div className="h-14 flex items-center"><div className="loading-spin" /></div> : <><span className="text-6xl font-black tracking-tighter">{distance}</span><span className="text-2xl font-bold opacity-20 italic">km</span></>}
                                        </div>
                                    </div>
                                    <div className="space-y-5 p-7 bg-white/5 rounded-[36px] border border-white/5 backdrop-blur-sm">
                                        <div className="flex justify-between items-center text-xs">
                                            <span className="opacity-30 font-bold uppercase">Vehicle</span>
                                            <span className="font-black text-blue-400">{selectedCategory.name} {selectedCategory.id === 'truck' ? selectedTon.name.split(' ')[0] : ''}</span>
                                        </div>
                                        <div className="flex justify-between items-center text-xs">
                                            <span className="opacity-30 font-bold uppercase">Surcharge</span>
                                            <div className="flex flex-wrap gap-2 justify-end">
                                                {isRoundTrip && <span className="px-2 py-0.5 bg-blue-500/20 text-blue-400 rounded-md font-black text-[9px]">왕복</span>}
                                                {waypointCount > 0 && <span className="px-2 py-0.5 bg-orange-500/20 text-orange-400 rounded-md font-black text-[9px]">경유{waypointCount}</span>}
                                                {weatherType !== 'none' && <span className="px-2 py-0.5 bg-indigo-500/20 text-indigo-400 rounded-md font-black text-[9px]">우천</span>}
                                                {!isRoundTrip && waypointCount === 0 && weatherType === 'none' && <span className="opacity-50 text-[10px]">일반운임</span>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-gradient-to-br from-white/10 to-transparent rounded-[40px] p-10 backdrop-blur-xl border border-white/10 mb-10 relative overflow-hidden group">
                                    <div className="absolute inset-0 bg-blue-500 opacity-0 group-hover:opacity-[0.03] transition-opacity" />
                                    <p className="text-blue-300 text-[10px] font-black uppercase tracking-widest mb-4">Estimated Quote (5K Unit)</p>
                                    <div className="flex items-baseline justify-between">
                                        <span className="text-5xl font-black tracking-tighter text-white">{formatPrice(calculation)}</span>
                                        <span className="text-xl font-bold opacity-20 italic">KRW</span>
                                    </div>
                                </div>
                                <button onClick={copyQuote} className="w-full py-6 bg-blue-600 text-white rounded-[28px] font-black text-lg hover:bg-blue-500 transition-all active:scale-95 shadow-2xl shadow-blue-900/40 relative z-10"> 견적 정보 복사하기 </button>
                                <div className="mt-12 pt-8 border-t border-white/5 flex items-start gap-4 opacity-50 relative z-10">
                                    <Icon name="Info" className="w-5 h-5 text-slate-500 shrink-0" />
                                    <p className="text-[10px] text-slate-500 leading-relaxed font-bold"> 본 요금은 5,000원 단위로 절상되어 계산됩니다. 이미지 데이터 및 카카오 내비 실거리를 기반으로 한 합리적인 평균가입니다. </p>
                                </div>
                            </div>
                        </div>
                    </main>

                    {isPostcodeVisible && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[99999] flex items-center justify-center p-6" onClick={(e) => { if(e.target === e.currentTarget) setIsPostcodeVisible(false); }}>
                            <div className="bg-white w-full max-w-xl rounded-[48px] overflow-hidden shadow-2xl flex flex-col h-[650px] animate-in zoom-in-95 duration-300">
                                <div className="p-8 border-b flex justify-between items-center bg-white">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-blue-50 p-3 rounded-2xl"><Icon name="Search" className="w-6 h-6 text-blue-600" /></div>
                                        <span className="text-xl font-black text-slate-900 tracking-tight">{postcodeTarget === 'start' ? '상차지' : '하차지'} 위치 검색</span>
                                    </div>
                                    <button onClick={() => setIsPostcodeVisible(false)} className="p-3 hover:bg-slate-50 rounded-full transition-colors"><Icon name="X" className="w-7 h-7 text-slate-300"/></button>
                                </div>
                                <div ref={postcodeContainerRef} className="w-full flex-1 bg-white relative"></div>
                                <div className="p-6 bg-slate-50/50 text-center text-[10px] text-slate-400 font-black uppercase tracking-[0.4em] border-t border-slate-100"> itgo Smart Geolocation Engine </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
