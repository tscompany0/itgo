<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>itgo - 잇고 통합 단가 매니저</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-color: #F8FAFC;
            -webkit-font-smoothing: antialiased;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        input[type='number']::-webkit-inner-spin-button, 
        input[type='number']::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        iframe { border: none !important; width: 100% !important; height: 100% !important; pointer-events: auto !important; position: relative; z-index: 10; }
        
        select { background-image: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- 안정적인 인라인 아이콘 컴포넌트 정의 ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                Truck: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13" /><polygon points="16 8 20 8 23 11 23 16 16 16 16 8" /><circle cx="5.5" cy="18.5" r="2.5" /><circle cx="18.5" cy="18.5" r="2.5" /></svg>,
                MapPin: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></svg>,
                Map: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" /><line x1="8" y1="2" x2="8" y2="18" /><line x1="16" y1="6" x2="16" y2="22" /></svg>,
                Package: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21" /><polyline points="21 16 21 7 12 2 3 7 3 16 12 21 21 16" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></svg>,
                PlusCircle: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></svg>,
                CheckCircle2: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" /><path d="m9 12 2 2 4-4" /></svg>,
                RotateCcw: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><polyline points="3 3 3 8 8 8" /></svg>,
                Calculator: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2" /><line x1="8" y1="6" x2="16" y2="6" /><line x1="16" y1="14" x2="16" y2="18" /><path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" /><path d="M12 14h.01" /><path d="M8 14h.01" /><path d="M12 18h.01" /><path d="M8 18h.01" /></svg>,
                Info: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>,
                Navigation: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11" /></svg>,
                Box: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></svg>,
                Search: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>,
                X: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
                ChevronDown: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9" /></svg>,
                Bike: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="5.5" cy="17.5" r="3.5" /><circle cx="18.5" cy="17.5" r="3.5" /><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2" /></svg>,
                Minus: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12" /></svg>,
                Plus: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>,
                Layers: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /><polyline points="2 12 12 17 22 12" /></svg>,
                ShieldCheck: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="m9 12 2 2 4-4" /></svg>,
                Link2: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 17H7A5 5 0 0 1 7 7h2" /><path d="M15 7h2a5 5 0 0 1 0 10h-2" /><line x1="8" y1="12" x2="16" y2="12" /></svg>
            };
            return icons[name] || null;
        };

        // --- 데이터 정의 ---
        const CATEGORIES = [
            { id: 'motorcycle', name: '오토바이 퀵', icon: <Icon name="Bike" className="w-8 h-8" /> },
            { id: 'damas', name: '다마스', icon: <Icon name="Box" className="w-8 h-8" /> },
            { id: 'labo', name: '라보', icon: <Icon name="Truck" className="w-8 h-8" /> },
            { id: 'truck', name: '일반 트럭', icon: <Icon name="Truck" className="w-8 h-8" /> },
        ];

        const TONS = [
            { id: '1ton', name: '1t', multiplier: 1.2, base: 40000 },
            { id: '1.4ton', name: '1.4t', multiplier: 1.4, base: 45000 },
            { id: '2.5ton', name: '2.5t', multiplier: 1.8, base: 60000 },
            { id: '3.5ton', name: '3.5t', multiplier: 2.0, base: 70000 },
            { id: '5ton', name: '5t', multiplier: 2.8, base: 90000 },
            { id: '8ton', name: '8t', multiplier: 3.5, base: 120000 },
            { id: '11ton', name: '11t', multiplier: 4.5, base: 140000 },
            { id: '18ton', name: '18t', multiplier: 5.2, base: 170000 },
            { id: '25ton', name: '25t', multiplier: 6.0, base: 180000 },
        ];

        const VEHICLE_TYPES = [
            { group: '카고계열', types: [
                { id: 'cargo', name: '카고', surcharge: 0 },
                { id: 'plus_cargo', name: '플러스카고', surcharge: 10000 },
                { id: 'chuk_cargo', name: '축카고', surcharge: 15000 },
                { id: 'full_chuk_cargo', name: '풀축카고', surcharge: 25000 },
            ]},
            { group: '윙바디계열', types: [
                { id: 'wing', name: '윙바디', surcharge: 20000 },
                { id: 'plus_wing', name: '플러스윙', surcharge: 25000 },
                { id: 'chuk_wing', name: '축윙', surcharge: 30000 },
                { id: 'full_chuk_wing', name: '풀축윙', surcharge: 40000 },
            ]},
            { group: '탑/냉동계열', types: [
                { id: 'top', name: '탑차', surcharge: 10000 },
                { id: 'freezer_top', name: '냉동탑', surcharge: 35000 },
                { id: 'fridge_top', name: '냉장탑', surcharge: 30000 },
                { id: 'freezer_wing', name: '냉동윙', surcharge: 45000 },
            ]},
            { group: '특수/리프트', types: [
                { id: 'lift_cargo', name: '리프트카고', surcharge: 25000 },
                { id: 'lift_wing', name: '리프트윙', surcharge: 35000 },
                { id: 'horu', name: '호루', surcharge: 15000 },
                { id: 'extra_long', name: '초장축', surcharge: 30000 },
            ]}
        ];

        const ITEM_CATEGORIES = [
            { id: 'pallet', name: '파레트', icon: '📦', sizes: ['1100*1100', '1200*1000', 'KPP규격', '기타'] },
            { id: 'box', name: '박스', icon: '📥', sizes: ['소형', '중형', '대형', '특대형'] },
            { id: 'furniture', name: '가구/가전', icon: '🛋️', sizes: ['1인용', '가족형', '대형가전'] },
            { id: 'other', name: '기타 화물', icon: '📝', sizes: ['직접입력'] },
        ];

        const ADDITIONAL_OPTIONS = [
            { id: 'lift', name: '리프트 사용 필수', price: 20000 },
            { id: 'driver_help', name: '기사님 상하차 도움', price: 30000 },
            { id: 'urgent', name: '긴급/당일 배차', price: 15000 },
            { id: 'round_trip', name: '왕복 운행 (회차)', price: 'multiplier' }, 
        ];

        const KAKAO_API_KEY = '1452d4f7d1995e5c8d57c8c7261cfee0';

        function App() {
            const [startPoint, setStartPoint] = useState({ address: '', x: null, y: null });
            const [endPoint, setEndPoint] = useState({ address: '', x: null, y: null });
            const [distance, setDistance] = useState(0); 

            const [selectedCategory, setSelectedCategory] = useState(CATEGORIES[3]);
            const [selectedTon, setSelectedTon] = useState(TONS[0]);
            const [selectedType, setSelectedType] = useState(VEHICLE_TYPES[0].types[0]);
            const [selectedOptions, setSelectedOptions] = useState([]);

            const [selectedItemCat, setSelectedItemCat] = useState(ITEM_CATEGORIES[0]);
            const [itemQty, setItemQty] = useState(1);
            const [itemSize, setItemSize] = useState(ITEM_CATEGORIES[0].sizes[0]);
            const [itemWeight, setItemWeight] = useState(0.1);

            const [isPostcodeVisible, setIsPostcodeVisible] = useState(false);
            const [postcodeTarget, setPostcodeTarget] = useState('start');
            const postcodeContainerRef = useRef(null);

            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js";
                script.async = true;
                document.head.appendChild(script);
                return () => { if(document.head.contains(script)) document.head.removeChild(script); };
            }, []);

            const fetchCoords = async (address) => {
                try {
                    const response = await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(address)}`, {
                        headers: { Authorization: `KakaoAK ${KAKAO_API_KEY}` }
                    });
                    const data = await response.json();
                    return data.documents?.length > 0 ? { x: parseFloat(data.documents[0].x), y: parseFloat(data.documents[0].y) } : null;
                } catch (e) { return null; }
            };

            const openPostcode = (type) => {
                setPostcodeTarget(type);
                setIsPostcodeVisible(true);
            };

            useEffect(() => {
                if (isPostcodeVisible && window.daum && postcodeContainerRef.current) {
                    postcodeContainerRef.current.innerHTML = '';
                    new window.daum.Postcode({
                        oncomplete: async (data) => {
                            const addr = data.address;
                            setIsPostcodeVisible(false);
                            const coords = await fetchCoords(addr);
                            const info = { address: addr, x: coords?.x, y: coords?.y };
                            if (postcodeTarget === 'start') setStartPoint(info);
                            else setEndPoint(info);
                        },
                        width: '100%',
                        height: '100%'
                    }).embed(postcodeContainerRef.current);
                }
            }, [isPostcodeVisible, postcodeTarget]);

            useEffect(() => {
                if (startPoint.x && endPoint.x) {
                    const R = 6371;
                    const dLat = (endPoint.y - startPoint.y) * (Math.PI / 180);
                    const dLon = (endPoint.x - startPoint.x) * (Math.PI / 180);
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(startPoint.y * (Math.PI/180)) * Math.cos(endPoint.y * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    setDistance(Math.max(1, Math.round(R * c * 1.28))); 
                }
            }, [startPoint, endPoint]);

            const calculation = useMemo(() => {
                const costPerKm = 850;
                let sizeInfo = selectedCategory.id === 'truck' ? selectedTon : 
                            selectedCategory.id === 'motorcycle' ? { base: 12000, multiplier: 0.55 } :
                            selectedCategory.id === 'damas' ? { base: 22000, multiplier: 0.85 } : { base: 28000, multiplier: 1.05 };

                let distanceCost = Math.max(0, distance - 10) * costPerKm * sizeInfo.multiplier;
                let baseTotal = sizeInfo.base + distanceCost;
                if (selectedOptions.includes('round_trip')) baseTotal *= 1.8;
                const typeSurcharge = selectedType.surcharge;
                const optionsTotal = selectedOptions.reduce((acc, optId) => {
                    if (optId === 'round_trip') return acc;
                    const opt = ADDITIONAL_OPTIONS.find(o => o.id === optId);
                    return acc + (opt?.price || 0);
                }, 0);
                return Math.floor((baseTotal + typeSurcharge + optionsTotal) / 100) * 100;
            }, [distance, selectedCategory, selectedTon, selectedType, selectedOptions]);

            const formatPrice = (p) => new Intl.NumberFormat('ko-KR').format(p);

            return (
                <div className="min-h-screen p-4 md:p-8 selection:bg-blue-100 selection:text-blue-900">
                    <header className="max-w-7xl mx-auto mb-10 flex items-center justify-between">
                        <div className="flex items-center gap-5">
                            <div className="bg-[#1E293B] p-4 rounded-[22px] text-white shadow-xl shadow-slate-200 flex items-center justify-center">
                                <Icon name="Link2" className="w-7 h-7 text-blue-400 mr-1" />
                                <span className="text-2xl font-black tracking-tighter italic">itgo</span>
                            </div>
                            <div className="h-10 w-px bg-slate-200 mx-1 hidden sm:block" />
                            <div className="hidden sm:block">
                                <h1 className="text-lg font-bold text-slate-800 leading-tight">잇고 통합 단가 매니저</h1>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-0.5">Freight Logistics Connector</p>
                            </div>
                        </div>
                        <button onClick={() => window.location.reload()} className="flex items-center gap-2 px-5 py-2.5 bg-white rounded-2xl border border-slate-200 text-slate-400 hover:text-blue-600 transition-all text-xs font-black shadow-sm active:scale-95">
                            <Icon name="RotateCcw" className="w-4 h-4" /> 리셋
                        </button>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start pb-20">
                        <div className="lg:col-span-8 space-y-6">
                            {/* 01. 구간지 설정 */}
                            <section className="bg-white p-7 rounded-[32px] shadow-sm border border-slate-200/50">
                                <h2 className="text-[11px] font-black text-slate-400 mb-6 uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="Navigation" className="w-3.5 h-3.5 text-blue-500" /> 01. 구간지 설정
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div onClick={() => openPostcode('start')} className="group cursor-pointer">
                                        <p className="text-[11px] font-bold text-slate-400 mb-2.5 ml-1">상차지 (출발)</p>
                                        <div className="p-4 bg-slate-50/50 border-2 border-slate-100 rounded-3xl group-hover:border-blue-400 group-hover:bg-white transition-all flex items-center gap-4">
                                            <div className="w-11 h-11 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-slate-50"><Icon name="MapPin" className="w-5 h-5 text-blue-500" /></div>
                                            <span className={`text-sm font-bold truncate flex-1 ${startPoint.address ? 'text-slate-900' : 'text-slate-300'}`}>
                                                {startPoint.address || '주소 검색'}
                                            </span>
                                        </div>
                                    </div>
                                    <div onClick={() => openPostcode('end')} className="group cursor-pointer">
                                        <p className="text-[11px] font-bold text-slate-400 mb-2.5 ml-1">하차지 (도착)</p>
                                        <div className="p-4 bg-slate-50/50 border-2 border-slate-100 rounded-3xl group-hover:border-orange-400 group-hover:bg-white transition-all flex items-center gap-4">
                                            <div className="w-11 h-11 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-slate-50"><Icon name="MapPin" className="w-5 h-5 text-orange-500" /></div>
                                            <span className={`text-sm font-bold truncate flex-1 ${endPoint.address ? 'text-slate-900' : 'text-slate-300'}`}>
                                                {endPoint.address || '주소 검색'}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* 02. 차량 제원 선택 */}
                            <section className="bg-white p-7 rounded-[32px] shadow-sm border border-slate-200/50">
                                <h2 className="text-[11px] font-black text-slate-400 mb-6 uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="Truck" className="w-3.5 h-3.5 text-blue-500" /> 02. 차량 제원 선택
                                </h2>
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
                                    {CATEGORIES.map(cat => (
                                        <button key={cat.id} onClick={() => setSelectedCategory(cat)} className={`flex flex-col items-center p-5 rounded-3xl border-2 transition-all ${selectedCategory.id === cat.id ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-slate-50 bg-slate-50/50 text-slate-400 hover:border-slate-200'}`}>
                                            <div className={`mb-2.5 p-2 rounded-xl ${selectedCategory.id === cat.id ? 'bg-blue-600 text-white' : 'bg-white'}`}>{cat.icon}</div>
                                            <span className="font-bold text-xs">{cat.name}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-slate-50/50 rounded-3xl border border-slate-100">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">Tonnage</label>
                                        <div className="relative">
                                            <select 
                                                disabled={selectedCategory.id !== 'truck'}
                                                value={selectedTon.id} 
                                                onChange={(e) => setSelectedTon(TONS.find(t => t.id === e.target.value))} 
                                                className="w-full p-3.5 bg-white border border-slate-200 rounded-2xl font-bold text-sm appearance-none outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all cursor-pointer disabled:opacity-40"
                                            >
                                                {TONS.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
                                                <Icon name="ChevronDown" className="w-4 h-4 text-slate-300" />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">Specification</label>
                                        <div className="relative">
                                            <select 
                                                value={selectedType.id} 
                                                onChange={(e) => {
                                                    const allTypes = VEHICLE_TYPES.flatMap(g => g.types);
                                                    setSelectedType(allTypes.find(v => v.id === e.target.value));
                                                }} 
                                                className="w-full p-3.5 bg-white border border-slate-200 rounded-2xl font-bold text-sm appearance-none outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all cursor-pointer"
                                            >
                                                {VEHICLE_TYPES.map(group => (
                                                    <optgroup key={group.group} label={group.group}>
                                                        {group.types.map(v => (
                                                            <option key={v.id} value={v.id}>{v.name}</option>
                                                        ))}
                                                    </optgroup>
                                                ))}
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
                                                <Icon name="ChevronDown" className="w-4 h-4 text-slate-300" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* 03. 화물 물품 정보 */}
                            <section className="bg-white p-7 rounded-[32px] shadow-sm border border-slate-200/50">
                                <h2 className="text-[11px] font-black text-slate-400 mb-6 uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="Package" className="w-3.5 h-3.5 text-blue-500" /> 03. 화물 물품 정보
                                </h2>
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
                                    {ITEM_CATEGORIES.map(cat => (
                                        <button key={cat.id} onClick={() => { setSelectedItemCat(cat); setItemSize(cat.sizes[0]); }} className={`flex flex-col items-center py-4 rounded-[22px] border-2 transition-all ${selectedItemCat.id === cat.id ? 'border-slate-800 bg-slate-800 text-white' : 'border-slate-50 bg-slate-50/50 text-slate-400'}`}>
                                            <span className="text-xl mb-1">{cat.icon}</span>
                                            <span className="font-bold text-[11px]">{cat.name}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-5 bg-slate-50/50 p-6 rounded-3xl border border-slate-100">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-slate-500 ml-1">수량</label>
                                        <div className="flex items-center bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                            <button onClick={() => setItemQty(Math.max(1, itemQty - 1))} className="px-4 py-3 hover:bg-slate-50 text-slate-400"><Icon name="Minus" className="w-3.5 h-3.5"/></button>
                                            <input type="number" value={itemQty} onChange={(e) => setItemQty(parseInt(e.target.value) || 1)} className="w-full text-center font-bold text-sm outline-none bg-transparent" />
                                            <button onClick={() => setItemQty(itemQty + 1)} className="px-4 py-3 hover:bg-slate-50 text-slate-400"><Icon name="Plus" className="w-3.5 h-3.5"/></button>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-slate-500 ml-1">규격</label>
                                        <select value={itemSize} onChange={(e) => setItemSize(e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-2xl font-bold text-sm outline-none shadow-sm cursor-pointer">
                                            {selectedItemCat.sizes.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-slate-500 ml-1">중량 (ton)</label>
                                        <div className="relative">
                                            <input type="number" step="0.1" value={itemWeight} onChange={(e) => setItemWeight(parseFloat(e.target.value) || 0)} className="w-full p-3 bg-white border border-slate-200 rounded-2xl font-bold text-sm outline-none shadow-sm" />
                                            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-300">t</span>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* 04. 부가 서비스 */}
                            <section className="bg-white p-7 rounded-[32px] shadow-sm border border-slate-200/50">
                                <h2 className="text-[11px] font-black text-slate-400 mb-6 uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="PlusCircle" className="w-3.5 h-3.5 text-blue-500" /> 04. 부가 서비스
                                </h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {ADDITIONAL_OPTIONS.map(opt => (
                                        <button key={opt.id} onClick={() => setSelectedOptions(prev => prev.includes(opt.id) ? prev.filter(x => x !== opt.id) : [...prev, opt.id])} className={`p-4 rounded-[22px] border-2 flex justify-between items-center transition-all ${selectedOptions.includes(opt.id) ? 'border-blue-500 bg-blue-50/30 text-blue-700' : 'border-slate-50 bg-slate-50/50 text-slate-400'}`}>
                                            <div className="flex items-center gap-3">
                                                <div className={`w-5 h-5 rounded-lg border-2 flex items-center justify-center ${selectedOptions.includes(opt.id) ? 'border-blue-500 bg-blue-500 text-white' : 'border-slate-200 bg-white'}`}>
                                                    {selectedOptions.includes(opt.id) && <Icon name="CheckCircle2" className="w-3.5 h-3.5" />}
                                                </div>
                                                <span className="text-xs font-bold">{opt.name}</span>
                                            </div>
                                            <span className="text-[10px] font-black opacity-60">{opt.price === 'multiplier' ? '1.8x' : `+${formatPrice(opt.price)}`}</span>
                                        </button>
                                    ))}
                                </div>
                            </section>
                        </div>

                        {/* 우측 단가 노출 영역 */}
                        <div className="lg:col-span-4 lg:sticky lg:top-8">
                            <div className="bg-[#1E293B] rounded-[40px] p-8 text-white shadow-2xl shadow-blue-900/10 border border-slate-800">
                                <div className="flex justify-between items-center mb-12">
                                    <div className="flex items-center gap-2 opacity-40">
                                        <Icon name="Link2" className="w-4 h-4" />
                                        <span className="text-[10px] font-black tracking-widest uppercase">itgo Internal</span>
                                    </div>
                                    <Icon name="ShieldCheck" className="w-5 h-5 text-blue-500/50" />
                                </div>
                                <div className="space-y-10 mb-12">
                                    <div>
                                        <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1.5 opacity-80">Freight Distance</p>
                                        <div className="flex items-baseline gap-1.5">
                                            <span className="text-5xl font-black tracking-tighter">{distance}</span>
                                            <span className="text-xl font-bold opacity-30">km</span>
                                        </div>
                                    </div>
                                    <div className="space-y-5 p-6 bg-white/5 rounded-[28px] border border-white/5">
                                        <div className="flex justify-between items-center text-xs">
                                            <span className="opacity-40">구간</span>
                                            <span className="font-bold text-blue-100">
                                                {startPoint.address ? startPoint.address.split(' ')[1] : '-'} ➝ {endPoint.address ? endPoint.address.split(' ')[1] : '-'}
                                            </span>
                                        </div>
                                        <div className="flex justify-between items-center text-xs">
                                            <span className="opacity-40">차량</span>
                                            <span className="font-bold text-blue-400">{selectedCategory.name} {selectedCategory.id === 'truck' ? selectedTon.name : ''}</span>
                                        </div>
                                        <div className="flex justify-between items-center text-xs">
                                            <span className="opacity-40">제원</span>
                                            <span className="font-bold text-slate-300">{selectedType.name}</span>
                                        </div>
                                        <div className="flex justify-between items-center text-[10px] pt-4 border-t border-white/5">
                                            <span className="opacity-40 uppercase">Cargo Info</span>
                                            <span className="font-bold text-slate-400">{selectedItemCat.name} | {itemQty}개 | {itemSize}</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-white/10 rounded-[32px] p-8 backdrop-blur-xl border border-white/10 mb-8">
                                    <p className="text-blue-300 text-[10px] font-black uppercase tracking-widest mb-3">Estimated Total Cost</p>
                                    <div className="flex items-baseline justify-between">
                                        <span className="text-4xl font-black tracking-tighter text-white">{formatPrice(calculation)}</span>
                                        <span className="text-lg font-bold opacity-30">원</span>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => {
                                        const text = `[itgo 견적서] ${startPoint.address.split(' ')[1]}->${endPoint.address.split(' ')[1]} | ${selectedCategory.name} ${selectedTon.name} ${selectedType.name} | 거리: ${distance}km | 운임: ${formatPrice(calculation)}원`;
                                        navigator.clipboard.writeText(text);
                                        alert('견적 정보가 복사되었습니다.');
                                    }} 
                                    className="w-full py-5 bg-blue-600 text-white rounded-[26px] font-black text-base hover:bg-blue-500 transition-all active:scale-95 shadow-xl shadow-blue-900/20"
                                >
                                    내역 복사하기
                                </button>
                                <div className="mt-10 pt-6 border-t border-white/5 flex items-start gap-3">
                                    <Icon name="Info" className="w-4 h-4 text-slate-500 shrink-0 mt-0.5" />
                                    <p className="text-[10px] text-slate-500 leading-relaxed font-bold">
                                        본 단가는 시장 평균 요율 기반의 사내 참고용입니다. 실제 배차 시 기상, 심야, 긴급 상황에 따라 변동될 수 있습니다.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* 주소 검색 모달 */}
                    {isPostcodeVisible && (
                        <div className="fixed inset-0 bg-[#0F172A]/80 backdrop-blur-md z-[99999] flex items-center justify-center p-4 overflow-hidden"
                            onClick={(e) => { if(e.target === e.currentTarget) setIsPostcodeVisible(false); }}>
                            <div className="bg-white w-full max-w-lg rounded-[40px] overflow-hidden shadow-2xl animate-in zoom-in-95 duration-300 flex flex-col h-[600px] border border-white/20">
                                <div className="p-6 border-b flex justify-between items-center bg-white font-black text-slate-900">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-blue-50 p-2.5 rounded-2xl"><Icon name="Search" className="w-5 h-5 text-blue-600" /></div>
                                        <span className="text-lg tracking-tight">{postcodeTarget === 'start' ? '상차지' : '하차지'} 검색</span>
                                    </div>
                                    <button onClick={() => setIsPostcodeVisible(false)} className="p-2.5 hover:bg-slate-100 rounded-full transition-colors"><Icon name="X" className="w-6 h-6 text-slate-300"/></button>
                                </div>
                                <div ref={postcodeContainerRef} className="w-full flex-1 bg-white relative">
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-300 gap-4">
                                        <div className="w-9 h-9 border-[3px] border-blue-500 border-t-transparent rounded-full animate-spin" />
                                        <p className="text-[11px] font-black tracking-widest uppercase opacity-50">Connecting Kakao API</p>
                                    </div>
                                </div>
                                <div className="p-5 bg-slate-50 text-center text-[9px] text-slate-400 font-black uppercase tracking-[0.3em] border-t border-slate-100">
                                    itgo Address Intelligence Service
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
