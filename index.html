<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>itgo - 잇고 배차 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-color: #F3F4F6;
            -webkit-font-smoothing: antialiased;
            color: #1F2937;
            overflow: hidden; /* Prevent body scroll, handle in layout */
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        input[type='number']::-webkit-inner-spin-button, 
        input[type='number']::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        iframe { border: none !important; width: 100% !important; height: 100% !important; pointer-events: auto !important; position: relative; z-index: 10; }
        
        select { background-image: none !important; }

        .loading-spin {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .input-field {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid #E5E7EB;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 1px #3B82F6;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- 안정적인 인라인 SVG 아이콘 컴포넌트 ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                Truck: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13" /><polygon points="16 8 20 8 23 11 23 16 16 16 16 8" /><circle cx="5.5" cy="18.5" r="2.5" /><circle cx="18.5" cy="18.5" r="2.5" /></svg>,
                MapPin: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></svg>,
                Package: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 16 21 7 12 2 3 7 3 16 12 21 21 16" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></svg>,
                Box: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" /></svg>,
                Search: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>,
                X: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
                ChevronDown: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9" /></svg>,
                Bike: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="5.5" cy="17.5" r="3.5" /><circle cx="18.5" cy="17.5" r="3.5" /><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2" /></svg>,
                Check: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>,
                Plus: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                Minus: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                User: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                List: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
                Calendar: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            };
            return icons[name] || null;
        };

        // --- 업계 평균 단가 데이터 (Fallback용) ---
        const CATEGORIES = [
            { id: 'motorcycle', name: '오토바이 퀵', icon: <Icon name="Bike" className="w-8 h-8" />, base: 9000, kmRate: 700 },
            { id: 'damas', name: '다마스', icon: <Icon name="Box" className="w-8 h-8" />, base: 25000, kmRate: 900 },
            { id: 'labo', name: '라보', icon: <Icon name="Truck" className="w-8 h-8" />, base: 30000, kmRate: 1000 },
            { id: 'truck', name: '트럭', icon: <Icon name="Truck" className="w-8 h-8" />, base: 45000, kmRate: 1200 },
        ];

        const TONS = [
            { id: '1ton', name: '1t' }, { id: '1.4ton', name: '1.4t' }, { id: '2.5ton', name: '2.5t' }, 
            { id: '3.5ton', name: '3.5t' }, { id: '5ton', name: '5t' }, { id: '8ton', name: '8t' }, 
            { id: '11ton', name: '11t' }, { id: '14ton', name: '14t' }, { id: '15ton', name: '15t' }, 
            { id: '18ton', name: '18t' }, { id: '25ton', name: '25t' },
        ];

        const VEHICLE_TYPES = [
            { id: 'cargo', name: '카고 (기본)', surcharge: 0 },
            { id: 'wing', name: '윙바디', surcharge: 20000 },
            { id: 'top', name: '탑차', surcharge: 10000 },
            { id: 'lift_cargo', name: '리프트', surcharge: 30000 },
            { id: 'freezer_top', name: '냉동', surcharge: 40000 }
        ];

        const METHOD_OPTIONS = [
            { id: 'basic', name: '기본 운송', desc: '차량이 건물 앞에서 건물 앞까지 운송합니다.', price: 0 },
            { id: 'forklift', name: '상하차(지게차)', desc: '파레트로 작업된 제품을 지게차로 상하차 합니다.', price: 0 },
            { id: 'helper_a', name: '기사님 도움 A', desc: '일반화물 또는 소형가전(3개미만) 을 고객님과 함께 운반합니다.', price: 20000 },
            { id: 'helper_b', name: '기사님 도움 B', desc: '기사님 도움 A + 간단이사 - 1층 또는 엘리베이터 기준', price: 50000 },
        ];

        // API 키 설정 (카카오 & 인성데이타)
        // 🚨 중요: KAKAO_API_KEY는 반드시 "REST API 키"를 입력하셔야 합니다! (JavaScript 키 아님)
        // 🚨 중요: 카카오 디벨로퍼스 -> Web 플랫폼에 'https://tscompany0.github.io' 도메인이 등록되어 있어야 합니다.
        const KAKAO_API_KEY = '1452d4f7d1995e5c8d57c8c7261cfee0';
        
        const INSUNG_API_URL = 'https://quick.api.insungdata.com/api/cost_distance/'; 
        const INSUNG_M_CODE = '7597';            
        const INSUNG_CC_CODE = '13016';          
        const INSUNG_TOKEN = 'ad3f4419d04864bb2ae27c03b1d27c3e'; 
        const INSUNG_USER_ID = '티에스컴퍼니';   // 한글 아이디 적용 완료

        function App() {
            // 상세 주소 및 연락처 폼 상태
            const [startInfo, setStartInfo] = useState({ address: '', detail: '', name: '', dept: '', manager: '', phone: '', x: null, y: null });
            const [endInfo, setEndPoint] = useState({ address: '', detail: '', name: '', dept: '', manager: '', phone: '', x: null, y: null });
            const [distance, setDistance] = useState(0); 

            // 차량 및 옵션 상태
            const [selectedCategory, setSelectedCategory] = useState(CATEGORIES[0]);
            const [selectedTon, setSelectedTon] = useState(TONS[0]);
            const [selectedType, setSelectedType] = useState(VEHICLE_TYPES[0]);
            const [selectedMethod, setSelectedMethod] = useState(METHOD_OPTIONS[0]);
            const [isPassenger, setIsPassenger] = useState(false);
            
            // 일정 상태
            const [loadDateType, setLoadDateType] = useState('now'); // now, custom
            const [unloadDateType, setUnloadDateType] = useState('today'); // today, custom

            // 추가 요금 및 결제 정보
            const [extraCost, setExtraCost] = useState(0);
            const [paymentMethod, setPaymentMethod] = useState('prepaid'); // prepaid, postpaid, card
            const [customerInfoType, setCustomerInfoType] = useState('sameAsStart'); // sameAsStart, sameAsEnd, custom
            const [customerInfo, setCustomerInfo] = useState({ name: '', phone: '' });

            // API 연동 상태
            const [insungCosts, setInsungCosts] = useState(null); 
            const [isFetchingQuote, setIsFetchingQuote] = useState(false);

            // 다음 우편번호 모달
            const [isPostcodeVisible, setIsPostcodeVisible] = useState(false);
            const [postcodeTarget, setPostcodeTarget] = useState('start');
            const postcodeContainerRef = useRef(null);
            const [toastMessage, setToastMessage] = useState('');

            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js";
                script.async = true;
                document.head.appendChild(script);
                return () => { if(document.head.contains(script)) document.head.removeChild(script); };
            }, []);

            const fetchCoords = async (address) => {
                try {
                    const response = await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(address)}`, {
                        headers: { Authorization: `KakaoAK ${KAKAO_API_KEY}` }
                    });
                    const data = await response.json();
                    return data.documents?.length > 0 ? { x: parseFloat(data.documents[0].x), y: parseFloat(data.documents[0].y) } : null;
                } catch (e) { 
                    console.error("좌표 변환 실패:", e);
                    return null; 
                }
            };

            const openPostcode = (type) => {
                setPostcodeTarget(type);
                setIsPostcodeVisible(true);
            };

            useEffect(() => {
                if (isPostcodeVisible && window.daum && postcodeContainerRef.current) {
                    postcodeContainerRef.current.innerHTML = '';
                    new window.daum.Postcode({
                        oncomplete: async (data) => {
                            const addr = data.address;
                            setIsPostcodeVisible(false);
                            const coords = await fetchCoords(addr);
                            if (postcodeTarget === 'start') {
                                setStartInfo(prev => ({ ...prev, address: addr, x: coords?.x, y: coords?.y }));
                            } else {
                                setEndPoint(prev => ({ ...prev, address: addr, x: coords?.x, y: coords?.y }));
                            }
                        },
                        width: '100%',
                        height: '100%'
                    }).embed(postcodeContainerRef.current);
                }
            }, [isPostcodeVisible, postcodeTarget]);

            // 🚀 실제 주행 거리(내비게이션) API 연동
            useEffect(() => {
                const calculateDistance = async () => {
                    if (startInfo.x && endInfo.x) {
                        try {
                            // 카카오 모빌리티(내비게이션) API로 실제 차량 주행 거리 요청
                            const url = `https://apis-navi.kakaomobility.com/v1/directions?origin=${startInfo.x},${startInfo.y}&destination=${endInfo.x},${endInfo.y}`;
                            const response = await fetch(url, {
                                headers: { Authorization: `KakaoAK ${KAKAO_API_KEY}` }
                            });
                            const data = await response.json();
                            
                            if (response.ok && data.routes && data.routes.length > 0) {
                                // m 단위를 km 단위로 변환 후 소수점 2자리까지 표시 (예: 45.16)
                                const distanceKm = (data.routes[0].summary.distance / 1000).toFixed(2);
                                setDistance(Number(distanceKm));
                                return; // 내비게이션 통신 성공 시 함수 종료
                            } else {
                                console.error("카카오 내비 에러 발생:", data);
                                showToast("카카오 'REST API 키' 또는 '도메인 등록'을 확인해주세요. (직선거리로 대체됨)");
                            }
                        } catch (e) {
                            console.error("내비게이션 API 네트워크 에러:", e);
                        }
                        
                        // 통신 실패나 경로를 찾을 수 없을 때만 기존 직선거리 공식 작동 (Fallback)
                        const R = 6371;
                        const dLat = (endInfo.y - startInfo.y) * (Math.PI / 180);
                        const dLon = (endInfo.x - startInfo.x) * (Math.PI / 180);
                        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(startInfo.y * (Math.PI/180)) * Math.cos(endInfo.y * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2);
                        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                        setDistance(Math.max(1, Math.round(R * c * 1.3))); 
                    }
                };
                
                calculateDistance();
            }, [startInfo, endInfo]);

            // 인성데이타 API 호출 로직
            useEffect(() => {
                const fetchInsungQuote = async () => {
                    if (distance > 0) {
                        setIsFetchingQuote(true);
                        try {
                            if (!INSUNG_USER_ID || INSUNG_USER_ID === 'YOUR_USER_ID') {
                                throw new Error("API ID 미입력");
                            }
                            
                            // 🚀 한글 아이디 처리를 위해 encodeURIComponent 적용
                            const encodedUserId = encodeURIComponent(INSUNG_USER_ID);
                            const targetUrl = `${INSUNG_API_URL}?type=json&m_code=${INSUNG_M_CODE}&cc_code=${INSUNG_CC_CODE}&token=${INSUNG_TOKEN}&user_id=${encodedUserId}&distance=${distance}`;
                            
                            // 🚀 브라우저 CORS(보안) 에러를 우회하기 위해 공개 프록시를 거쳐 호출합니다. (필수)
                            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
                            
                            const response = await fetch(proxyUrl);
                            const data = await response.json();
                            
                            let costData = Array.isArray(data) ? (data.find(item => item.basic_cost !== undefined) || data[1] || data[0]) : data;
                            
                            if (costData && costData.basic_cost !== undefined) {
                                setInsungCosts(costData); // 실제 인성데이타 요금 반영
                            } else {
                                throw new Error("요금 정보 없음");
                            }
                        } catch (error) {
                            console.error("인성데이타 통신 오류:", error);
                            showToast("인성데이타 통신에 실패하여 임시 단가표로 계산됩니다.");
                            
                            // Fallback mock data if API fails
                            setInsungCosts({
                                basic_cost: distance * 700 + 9000,
                                damas_cost: distance * 900 + 25000,
                                labo_cost: distance * 1000 + 30000,
                                truck_cost: distance * 1200 + 45000,
                                cargo_1_4_cost: distance * 1300 + 55000,
                                cargo_2_5_cost: distance * 1500 + 80000,
                                cargo_3_5_cost: distance * 1800 + 100000,
                                cargo_5_cost: distance * 2200 + 150000,
                                cargo_11_cost: distance * 3200 + 220000,
                                cargo_25_cost: distance * 4500 + 350000
                            });
                        } finally {
                            setIsFetchingQuote(false);
                        }
                    }
                };
                fetchInsungQuote();
            }, [distance]);

            const calculation = useMemo(() => {
                let apiBaseCost = 0;
                if (insungCosts) {
                    if (selectedCategory.id === 'motorcycle') apiBaseCost = Number(insungCosts.basic_cost);
                    else if (selectedCategory.id === 'damas') apiBaseCost = Number(insungCosts.damas_cost);
                    else if (selectedCategory.id === 'labo') apiBaseCost = Number(insungCosts.labo_cost);
                    else if (selectedCategory.id === 'truck') {
                        switch(selectedTon.id) {
                            case '1ton': apiBaseCost = Number(insungCosts.truck_cost); break;
                            case '1.4ton': apiBaseCost = Number(insungCosts.cargo_1_4_cost); break;
                            case '2.5ton': apiBaseCost = Number(insungCosts.cargo_2_5_cost); break;
                            case '3.5ton': apiBaseCost = Number(insungCosts.cargo_3_5_cost); break;
                            case '5ton': apiBaseCost = Number(insungCosts.cargo_5_cost); break;
                            case '11ton': apiBaseCost = Number(insungCosts.cargo_11_cost); break;
                            case '25ton': apiBaseCost = Number(insungCosts.cargo_25_cost); break;
                            default: apiBaseCost = Number(insungCosts.truck_cost); break;
                        }
                    }
                }
                
                let total = apiBaseCost || 0;
                total += selectedType.surcharge;
                total += selectedMethod.price;
                if (isPassenger) total += 10000;

                return Math.floor(total / 100) * 100;
            }, [insungCosts, selectedCategory, selectedTon, selectedType, selectedMethod, isPassenger]);

            const finalTotal = calculation + Number(extraCost);
            const formatPrice = (p) => new Intl.NumberFormat('ko-KR').format(p || 0);

            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(''), 5000); // 읽을 수 있게 5초로 증가
            };

            // 좌측 사이드바 메뉴 컴포넌트
            const SidebarItem = ({ icon, label, active }) => (
                <div className={`w-full flex flex-col items-center justify-center py-4 cursor-pointer transition-colors ${active ? 'bg-blue-600 text-white border-l-4 border-white' : 'text-slate-400 hover:text-white hover:bg-slate-700 border-l-4 border-transparent'}`}>
                    <Icon name={icon} className="w-6 h-6 mb-1" />
                    <span className="text-[11px] font-bold">{label}</span>
                </div>
            );

            return (
                <div className="flex h-screen w-full bg-[#f4f6f8]">
                    {/* 토스트 메시지 */}
                    {toastMessage && (
                        <div className="fixed top-5 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-md shadow-lg z-[9999] text-sm font-bold animate-in fade-in slide-in-from-top-5">
                            {toastMessage}
                        </div>
                    )}

                    {/* Left Sidebar (Dark Blue/Black) */}
                    <aside className="w-[100px] bg-[#1a2233] flex flex-col justify-between h-full flex-shrink-0 relative z-20">
                        <div>
                            {/* Logo */}
                            <div className="h-20 flex items-center justify-center border-b border-slate-700/50 mb-4">
                                <div className="flex items-center gap-1">
                                    <Icon name="Box" className="w-5 h-5 text-blue-400" />
                                    <span className="text-white font-black italic tracking-tighter text-lg">itgo</span>
                                </div>
                            </div>
                            
                            {/* Menus */}
                            <SidebarItem icon="Truck" label="화물등록" active={true} />
                            <SidebarItem icon="List" label="배차내역" active={false} />
                            <SidebarItem icon="User" label="거래처" active={false} />
                        </div>

                        {/* Bottom Info */}
                        <div className="p-3 mb-4 flex flex-col gap-2 items-center">
                            <div className="text-[10px] text-slate-400 font-bold bg-slate-800 rounded-full px-3 py-1">Homepage</div>
                            <div className="text-[10px] text-slate-400 font-bold bg-slate-800 rounded-full px-3 py-1">Tel</div>
                            <div className="text-white font-bold text-xs">1844-1562</div>
                            <div className="text-[10px] text-slate-500 mt-2 text-center">24시간 운영</div>
                        </div>
                    </aside>

                    {/* Main Content Area (Scrollable) */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar relative z-10 p-8">
                        <div className="max-w-[1000px] mx-auto pb-20">
                            
                            {/* Top Header */}
                            <div className="flex justify-between items-center mb-8">
                                <div className="flex items-center gap-2 text-slate-500">
                                    <Icon name="User" className="w-6 h-6" />
                                    <span className="font-medium text-sm">로그인해주세요.</span>
                                </div>
                                <button className="text-sm font-bold text-slate-600 hover:text-slate-900 px-4 py-2 border border-slate-300 rounded-md bg-white">
                                    로그인
                                </button>
                            </div>

                            {/* Section 1: 출/도착지 */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 relative">
                                {/* 교환 아이콘 중앙 배치 (데스크탑) */}
                                <div className="hidden md:flex absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-10 w-8 h-8 bg-white border border-slate-200 rounded-full items-center justify-center text-blue-500">
                                    ⇄
                                </div>

                                {/* 출발지 */}
                                <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                                    <h3 className="font-bold text-lg mb-1">출발지</h3>
                                    <p className="text-xs text-red-500 mb-4">필수 입력칸을 모두 작성해주세요.</p>
                                    <div className="space-y-3">
                                        <div className="relative">
                                            <input type="text" readOnly placeholder="주소를 입력해주세요. *" value={startInfo.address} onClick={() => openPostcode('start')} className="input-field bg-slate-50 cursor-pointer text-blue-600 font-bold" />
                                        </div>
                                        <input type="text" placeholder="상세주소를 입력해주세요." value={startInfo.detail} onChange={e => setStartInfo({...startInfo, detail: e.target.value})} className="input-field" />
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="text" placeholder="상호/이름 *" value={startInfo.name} onChange={e => setStartInfo({...startInfo, name: e.target.value})} className="input-field" />
                                            <input type="text" placeholder="부서명" value={startInfo.dept} onChange={e => setStartInfo({...startInfo, dept: e.target.value})} className="input-field" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="text" placeholder="담당자명" value={startInfo.manager} onChange={e => setStartInfo({...startInfo, manager: e.target.value})} className="input-field" />
                                            <input type="text" placeholder="연락처 *" value={startInfo.phone} onChange={e => setStartInfo({...startInfo, phone: e.target.value})} className="input-field" />
                                        </div>
                                    </div>
                                </div>

                                {/* 도착지 */}
                                <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                                    <h3 className="font-bold text-lg mb-1">도착지</h3>
                                    <p className="text-xs text-red-500 mb-4">필수 입력칸을 모두 작성해주세요.</p>
                                    <div className="space-y-3">
                                        <div className="relative">
                                            <input type="text" readOnly placeholder="주소를 입력해주세요. *" value={endInfo.address} onClick={() => openPostcode('end')} className="input-field bg-slate-50 cursor-pointer text-blue-600 font-bold" />
                                        </div>
                                        <input type="text" placeholder="상세주소를 입력해주세요." value={endInfo.detail} onChange={e => setEndPoint({...endInfo, detail: e.target.value})} className="input-field" />
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="text" placeholder="상호/이름" value={endInfo.name} onChange={e => setEndPoint({...endInfo, name: e.target.value})} className="input-field" />
                                            <input type="text" placeholder="부서명" value={endInfo.dept} onChange={e => setEndPoint({...endInfo, dept: e.target.value})} className="input-field" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="text" placeholder="담당자명" value={endInfo.manager} onChange={e => setEndPoint({...endInfo, manager: e.target.value})} className="input-field" />
                                            <input type="text" placeholder="연락처" value={endInfo.phone} onChange={e => setEndPoint({...endInfo, phone: e.target.value})} className="input-field" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Section 2: 차량/물품/일정 */}
                            <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200 mb-8">
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-x-12 gap-y-8">
                                    
                                    {/* Left Column */}
                                    <div>
                                        <h3 className="font-bold mb-3">차량선택</h3>
                                        <div className="grid grid-cols-4 gap-2 mb-6">
                                            {CATEGORIES.map(cat => (
                                                <div key={cat.id} onClick={() => setSelectedCategory(cat)} className={`flex flex-col items-center justify-center p-3 rounded-xl border-2 cursor-pointer transition-all ${selectedCategory.id === cat.id ? 'border-blue-500 bg-blue-50 text-blue-600' : 'border-slate-100 hover:border-slate-300'}`}>
                                                    <div className="mb-2 text-slate-600">{cat.icon}</div>
                                                    <span className="text-[11px] font-bold">{cat.name}</span>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <h3 className="font-bold mb-2 text-sm">톤수선택</h3>
                                                <select 
                                                    disabled={selectedCategory.id !== 'truck'}
                                                    value={selectedTon.id} onChange={(e) => setSelectedTon(TONS.find(t => t.id === e.target.value))}
                                                    className="input-field disabled:bg-slate-100 disabled:text-slate-400"
                                                >
                                                    {TONS.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <h3 className="font-bold mb-2 text-sm">차종선택</h3>
                                                <select 
                                                    value={selectedType.id} onChange={(e) => setSelectedType(VEHICLE_TYPES.find(v => v.id === e.target.value))}
                                                    className="input-field"
                                                >
                                                    {VEHICLE_TYPES.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                                                </select>
                                            </div>
                                        </div>

                                        {/* 일정 선택 */}
                                        <div className="grid grid-cols-2 gap-4 mt-8">
                                            <div>
                                                <h3 className="font-bold mb-2 text-sm">상차일을 선택하세요.</h3>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setLoadDateType('now')} className={`flex-1 py-2 px-3 text-xs font-bold rounded-md border ${loadDateType === 'now' ? 'border-blue-500 text-blue-500 bg-blue-50' : 'border-slate-300 text-slate-500 hover:bg-slate-50'}`}>
                                                        <span className="mr-1">✓</span> 지금
                                                    </button>
                                                    <button onClick={() => setLoadDateType('custom')} className={`flex-1 py-2 px-3 text-xs font-bold rounded-md border ${loadDateType === 'custom' ? 'border-blue-500 text-blue-500 bg-blue-50' : 'border-slate-300 text-slate-500 hover:bg-slate-50'}`}>
                                                        지정
                                                    </button>
                                                </div>
                                            </div>
                                            <div>
                                                <h3 className="font-bold mb-2 text-sm">하차일을 선택하세요.</h3>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setUnloadDateType('today')} className={`flex-1 py-2 px-3 text-xs font-bold rounded-md border ${unloadDateType === 'today' ? 'border-blue-500 text-blue-500 bg-blue-50' : 'border-slate-300 text-slate-500 hover:bg-slate-50'}`}>
                                                        <span className="mr-1">✓</span> 당일
                                                    </button>
                                                    <button onClick={() => setUnloadDateType('custom')} className={`flex-1 py-2 px-3 text-xs font-bold rounded-md border ${unloadDateType === 'custom' ? 'border-blue-500 text-blue-500 bg-blue-50' : 'border-slate-300 text-slate-500 hover:bg-slate-50'}`}>
                                                        지정
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Right Column */}
                                    <div>
                                        <div className="flex items-center gap-2 mb-3">
                                            <h3 className="font-bold">물품정보</h3>
                                            <span className="text-xs text-slate-400">다중 선택이 가능합니다.</span>
                                        </div>
                                        
                                        <div className="grid grid-cols-4 gap-2 mb-2 text-center text-xs font-bold text-slate-500 bg-slate-50 py-2 rounded-md">
                                            <div>파레트</div>
                                            <div>박스</div>
                                            <div>가구</div>
                                            <div>기타</div>
                                        </div>
                                        
                                        <div className="grid grid-cols-4 gap-2 mb-6">
                                            {/* Dummy inputs to mock the UI exactly as screenshot */}
                                            <div className="space-y-2">
                                                <input type="text" placeholder="개수입력" className="input-field text-center text-xs" />
                                                <select className="input-field text-xs"><option>규격선택</option></select>
                                            </div>
                                            <div className="space-y-2">
                                                <input type="text" placeholder="수량입력" className="input-field text-center text-xs" />
                                                <select className="input-field text-xs"><option>규격선택</option></select>
                                            </div>
                                            <div className="space-y-2">
                                                <input type="text" placeholder="개수입력" className="input-field text-center text-xs" />
                                                <input type="text" placeholder="중량(t)입력" className="input-field text-center text-xs" />
                                            </div>
                                            <div className="space-y-2">
                                                <input type="text" placeholder="물품명 입력" className="input-field text-center text-xs" />
                                            </div>
                                        </div>

                                        <h3 className="font-bold mb-2 text-sm">물품 추가정보</h3>
                                        <textarea 
                                            placeholder="추가정보를 입력해주세요." 
                                            className="w-full h-24 p-3 border border-slate-200 rounded-md text-sm outline-none focus:border-blue-500 resize-none"
                                        ></textarea>
                                    </div>

                                </div>
                            </div>

                            {/* Section 3: 상하차 방법 및 동승여부 */}
                            <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex items-center gap-2">
                                        <h3 className="font-bold">상하차 방법 및 동승여부</h3>
                                        <span className="text-xs text-red-500">추가 요금이 발생할 수 있습니다.</span>
                                    </div>
                                    <label className="flex items-center gap-2 cursor-pointer bg-slate-100 px-3 py-1.5 rounded-full">
                                        <input type="checkbox" checked={isPassenger} onChange={() => setIsPassenger(!isPassenger)} className="w-4 h-4 accent-slate-400" />
                                        <span className="text-sm font-medium text-slate-600">동승 1인</span>
                                    </label>
                                </div>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-4 gap-4">
                                    {METHOD_OPTIONS.map(opt => (
                                        <div key={opt.id} onClick={() => setSelectedMethod(opt)} className={`p-4 rounded-md border cursor-pointer transition-all ${selectedMethod.id === opt.id ? 'border-blue-500 bg-blue-50/30' : 'border-slate-200 hover:bg-slate-50'}`}>
                                            <div className="flex items-center gap-2 mb-2">
                                                <div className={`w-4 h-4 rounded-full border flex items-center justify-center ${selectedMethod.id === opt.id ? 'border-blue-500' : 'border-slate-300'}`}>
                                                    {selectedMethod.id === opt.id && <div className="w-2 h-2 bg-blue-500 rounded-full" />}
                                                </div>
                                                <span className={`text-sm font-bold ${selectedMethod.id === opt.id ? 'text-blue-600' : 'text-slate-700'}`}>{opt.name}</span>
                                            </div>
                                            <p className="text-xs text-slate-500 leading-snug">{opt.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </main>

                    {/* Right Sidebar (Dark Theme) */}
                    <aside className="w-[340px] bg-[#222831] text-white flex flex-col h-full flex-shrink-0 relative z-20 shadow-[-4px_0_15px_rgba(0,0,0,0.1)] custom-scrollbar overflow-y-auto">
                        <div className="p-6">
                            {/* 운송요금 */}
                            <h2 className="text-sm font-bold text-slate-300 mb-4">운송요금</h2>
                            <div className="flex justify-between items-end mb-6">
                                <div>
                                    <p className="text-xs text-slate-400 mb-1">운송거리</p>
                                    <p className="text-2xl font-black">{distance}<span className="text-base font-medium text-slate-400 ml-1">km</span></p>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs text-slate-400 mb-1">AI 추천요금</p>
                                    {isFetchingQuote ? (
                                        <div className="flex items-center gap-2 text-xl font-black">
                                            <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                            <span>계산중</span>
                                        </div>
                                    ) : (
                                        <p className="text-2xl font-black">{formatPrice(calculation)}<span className="text-base font-medium text-slate-400 ml-1">원</span></p>
                                    )}
                                </div>
                            </div>

                            {/* 추가요금 */}
                            <h2 className="text-sm font-bold text-slate-300 mb-2">추가요금</h2>
                            <div className="flex items-center gap-2 mb-4">
                                <button onClick={() => setExtraCost(Math.max(0, extraCost - 5000))} className="w-10 h-10 bg-slate-700 rounded flex items-center justify-center hover:bg-slate-600 font-bold text-lg">-</button>
                                <div className="flex-1 bg-slate-800 rounded h-10 flex items-center justify-end px-3 border border-slate-700">
                                    <input type="number" value={extraCost} onChange={e => setExtraCost(Number(e.target.value))} className="bg-transparent text-right w-full outline-none font-bold" />
                                    <span className="text-slate-400 ml-1 text-sm">원</span>
                                </div>
                                <button onClick={() => setExtraCost(extraCost + 5000)} className="w-10 h-10 bg-blue-600 rounded flex items-center justify-center hover:bg-blue-500 font-bold text-lg">+</button>
                            </div>

                            {/* Total */}
                            <div className="bg-white rounded-lg text-slate-900 p-4 mb-3 text-right">
                                <span className="text-sm font-bold mr-2">총</span>
                                <span className="text-3xl font-black text-blue-600">{formatPrice(finalTotal)}</span>
                                <span className="text-sm font-bold text-blue-600 ml-1">원</span>
                            </div>

                            <div className="flex justify-between items-center mb-8 border-b border-slate-700 pb-6">
                                <span className="text-xs text-slate-400">직접 금액을 입력해주세요.</span>
                                <label className="flex items-center gap-1.5 cursor-pointer">
                                    <div className="w-4 h-4 rounded-full border border-slate-400 flex items-center justify-center bg-slate-300">
                                        <div className="w-2 h-2 bg-slate-600 rounded-full"></div>
                                    </div>
                                    <span className="text-xs font-bold text-slate-300">AI 추천단가</span>
                                </label>
                            </div>

                            {/* 고객정보 */}
                            <h2 className="text-sm font-bold text-slate-300 mb-3">고객정보</h2>
                            <div className="bg-white rounded-lg p-4 mb-8 text-slate-800">
                                <div className="flex gap-4 mb-4">
                                    <label className="flex items-center gap-1.5 cursor-pointer text-xs font-bold">
                                        <input type="radio" name="customer" checked={customerInfoType === 'sameAsStart'} onChange={() => setCustomerInfoType('sameAsStart')} className="accent-slate-500" /> 출발지와 동일
                                    </label>
                                    <label className="flex items-center gap-1.5 cursor-pointer text-xs font-bold">
                                        <input type="radio" name="customer" checked={customerInfoType === 'sameAsEnd'} onChange={() => setCustomerInfoType('sameAsEnd')} className="accent-slate-500" /> 도착지와 동일
                                    </label>
                                </div>
                                <input type="text" placeholder="이름/상호" className="w-full border-b border-slate-200 py-2 text-sm outline-none mb-2" />
                                <input type="text" placeholder="연락처" className="w-full border-b border-slate-200 py-2 text-sm outline-none mb-4" />
                                <div className="bg-red-50 text-red-500 text-[10px] p-2 rounded text-center font-medium">
                                    * 접수를 하시면 자동로그인 됩니다.
                                </div>
                            </div>

                            {/* 결제방법 */}
                            <h2 className="text-sm font-bold text-slate-300 mb-3">결제방법</h2>
                            <div className="grid grid-cols-3 gap-2 mb-4">
                                <label className={`flex flex-col items-center p-3 rounded-lg border cursor-pointer transition-colors ${paymentMethod === 'prepaid' ? 'border-blue-500 bg-blue-50 text-blue-600' : 'border-slate-600 bg-transparent text-white hover:bg-slate-800'}`}>
                                    <input type="radio" name="payment" className="hidden" onChange={() => setPaymentMethod('prepaid')} />
                                    <div className={`w-3 h-3 rounded-full border mb-2 flex items-center justify-center ${paymentMethod === 'prepaid' ? 'border-blue-500' : 'border-slate-400'}`}>
                                        {paymentMethod === 'prepaid' && <div className="w-1.5 h-1.5 bg-blue-500 rounded-full" />}
                                    </div>
                                    <span className="text-xs font-bold">선불(현금)</span>
                                </label>
                                <label className={`flex flex-col items-center p-3 rounded-lg border cursor-pointer transition-colors ${paymentMethod === 'postpaid' ? 'border-blue-500 bg-blue-50 text-blue-600' : 'border-slate-600 bg-transparent text-white hover:bg-slate-800'}`}>
                                    <input type="radio" name="payment" className="hidden" onChange={() => setPaymentMethod('postpaid')} />
                                    <div className={`w-3 h-3 rounded-full border mb-2 flex items-center justify-center ${paymentMethod === 'postpaid' ? 'border-blue-500' : 'border-slate-400'}`}>
                                        {paymentMethod === 'postpaid' && <div className="w-1.5 h-1.5 bg-blue-500 rounded-full" />}
                                    </div>
                                    <span className="text-xs font-bold">착불(현금)</span>
                                </label>
                                <label className={`flex flex-col items-center p-3 rounded-lg border cursor-pointer transition-colors ${paymentMethod === 'card' ? 'border-blue-500 bg-blue-50 text-blue-600' : 'border-slate-600 bg-transparent text-white hover:bg-slate-800'}`}>
                                    <input type="radio" name="payment" className="hidden" onChange={() => setPaymentMethod('card')} />
                                    <div className={`w-3 h-3 rounded-full border mb-2 flex items-center justify-center ${paymentMethod === 'card' ? 'border-blue-500' : 'border-slate-400'}`}>
                                        {paymentMethod === 'card' && <div className="w-1.5 h-1.5 bg-blue-500 rounded-full" />}
                                    </div>
                                    <span className="text-xs font-bold">신용카드</span>
                                </label>
                            </div>

                            {/* 간편결제 */}
                            <div className="grid grid-cols-2 gap-2 mb-6">
                                <button className="bg-white rounded-lg py-2 flex items-center justify-center h-10">
                                    <span className="text-blue-600 font-black italic text-lg">toss<span className="text-slate-800">pay</span></span>
                                </button>
                                <button className="bg-[#FAE100] rounded-lg py-2 flex items-center justify-center h-10">
                                    <span className="text-[#391B1B] font-black text-sm">카카오페이</span>
                                </button>
                            </div>

                            <p className="text-[10px] text-slate-400 leading-relaxed mb-6">
                                신용카드/간편결제 및 계산서 발행은 VAT별도입니다.<br/>
                                배차취소는 <strong className="text-slate-300">콜센터(1844-1562)</strong>를 통해 접수해주세요.
                            </p>

                            <button onClick={() => showToast('배차 신청이 접수되었습니다!')} className="w-full bg-slate-300 hover:bg-white text-slate-800 font-black py-4 rounded-lg transition-colors text-lg">
                                배차신청
                            </button>
                        </div>
                    </aside>

                    {/* 주소 검색 모달 */}
                    {isPostcodeVisible && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[99999] flex items-center justify-center p-4"
                            onClick={(e) => { if(e.target === e.currentTarget) setIsPostcodeVisible(false); }}>
                            <div className="bg-white w-full max-w-lg rounded-xl overflow-hidden shadow-2xl flex flex-col h-[600px]">
                                <div className="p-4 border-b flex justify-between items-center bg-slate-50">
                                    <span className="font-bold text-slate-800">{postcodeTarget === 'start' ? '출발지' : '도착지'} 주소 검색</span>
                                    <button onClick={() => setIsPostcodeVisible(false)} className="p-1 hover:bg-slate-200 rounded"><Icon name="X" className="w-5 h-5 text-slate-500"/></button>
                                </div>
                                <div ref={postcodeContainerRef} className="w-full flex-1 bg-white relative">
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-300">
                                        <div className="loading-spin mb-2" />
                                        <span className="text-xs font-bold">카카오 주소검색 로딩중...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
